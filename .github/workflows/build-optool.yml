name: Build optool

on:
  workflow_dispatch:
  push:
    branches: [master, main]

permissions:
  contents: read

jobs:
  build-macos-arm64:
    name: Build macOS arm64
    runs-on: macos-15

    steps:
      - name: Checkout optool with submodules
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Show runner and Xcode info
        run: |
          uname -m
          xcodebuild -version
          xcodebuild -list -project optool.xcodeproj

      - name: Build optool for Apple Silicon
        run: |
          set -euxo pipefail

          xcodebuild \
            -project optool.xcodeproj \
            -target optool \
            -configuration Release \
            -sdk macosx \
            ARCHS=arm64 \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGNING_ALLOWED=NO \
            SYMROOT="$PWD/build" \
            OBJROOT="$PWD/build/obj" \
            build

      - name: Package binary
        run: |
          set -euxo pipefail

          mkdir -p dist
          cp "$PWD/build/Release/optool" dist/optool
          chmod +x dist/optool

          codesign --force --sign - dist/optool

          file dist/optool
          lipo -archs dist/optool | grep -w arm64
          codesign --verify --verbose dist/optool

      - name: Upload optool
        uses: actions/upload-artifact@v4
        with:
          name: optool-macos-arm64
          path: dist/optool
          retention-days: 14