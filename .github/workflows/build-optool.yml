name: Build optool

on:
  workflow_dispatch:
  push:
    branches: [master, main]

permissions:
  contents: read

jobs:
  build-macos-arm64:
    name: Build macOS arm64
    runs-on: macos-15

    steps:
      - name: Checkout optool with submodules
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Show runner and Xcode info
        run: |
          uname -m
          xcodebuild -version

      - name: Build optool for Apple Silicon
        run: |
          set -euxo pipefail

          xcodebuild \
            -project optool.xcodeproj \
            -target optool \
            -configuration Release \
            -sdk macosx \
            -derivedDataPath "$PWD/build/DerivedData" \
            ARCHS=arm64 \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Package binary
        run: |
          set -euxo pipefail

          mkdir -p dist
          BIN="$(find "$PWD/build/DerivedData/Build/Products/Release" -type f -name optool -perm +111 -print -quit)"
          cp "$BIN" dist/optool
          chmod +x dist/optool

          # Apple Silicon macOS generally expects Mach-O executables to be signed.
          # This is an ad-hoc signature; no Apple Developer account needed.
          codesign --force --sign - dist/optool

          file dist/optool
          lipo -archs dist/optool | grep -w arm64
          codesign --verify --verbose dist/optool

      - name: Upload optool
        uses: actions/upload-artifact@v4
        with:
          name: optool-macos-arm64
          path: dist/optool
          retention-days: 14